<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in - Halftask</title>
  <meta name="description" content="Log in to your Halftask account to continue. Velocity through Simplicity.">
  <!-- Google Fonts: Plus Jakarta Sans for headers, Inter for body UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-sage-green: #95ada2;
      --color-sage-green-dark: #708a7d;
      --color-sage-green-deep: #2d4036;
      --color-sage-green-light: #b5c8be;
      --color-cream-bg: #f4f3ef;
      --color-charcoal: #1b1e1c;
      --color-border-color: #d2d7d4;
      --color-error-color: #c83232;
      
      --animate-slide-up-fade: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      --animate-float-widget: floatWidget 6s ease-in-out infinite;
    }

    @keyframes slideUpFade {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes floatWidget {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes spinner {
      to {
        transform: rotate(360deg);
      }
    }

    .visible {
      opacity: 1 !important;
    }

    /* Validation borders */
    .form-group.invalid input {
      border-color: var(--color-error-color) !important;
      background-color: #fff9f9 !important;
    }
  </style>
</head>
<body class="bg-cream-bg font-sans min-h-screen relative flex items-center justify-center p-4 md:p-6 m-0 overflow-x-hidden selection:bg-sage-green selection:text-charcoal">
  
  <!-- Dual Background Split matching mockup exactly -->
  <div class="absolute inset-0 w-full h-full z-0 overflow-hidden pointer-events-none">
    <!-- Left Background: Expanded Brand Image, cropped diagonally -->
    <div class="absolute inset-y-0 left-0 w-[70%] bg-cover bg-center filter brightness-[0.35] blur-[1px]" style="background-image: url('halftask_theme_art.png'); clip-path: polygon(0 0, 100% 0, 58% 100%, 0 100%);"></div>
    <!-- Right Background: Solid Faint Green color for screen background -->
    <div class="absolute inset-0 -z-10 bg-[#eaf0ed]"></div>
  </div>

  <main class="relative z-10 w-full max-w-[1080px] flex items-center justify-center">
    <!-- Main Card Container -->
    <div class="bg-white rounded-[40px] shadow-[0_30px_70px_rgba(45,64,54,0.06),0_0_1px_rgba(0,0,0,0.05)] border border-sage-green-light/25 w-full grid grid-cols-1 lg:grid-cols-12 p-3.5 gap-4 min-h-[660px] translate-y-[20px] opacity-0 animate-slide-up-fade">
      
      <!-- Left Side: Inset Artwork Showcase Panel -->
      <div class="lg:col-span-5 rounded-[30px] p-8 flex flex-col justify-between text-white relative overflow-hidden min-h-[440px] lg:min-h-0 bg-cover bg-center animate-float-widget" style="background-image: url('halftask_theme_art.png');">
        <!-- Visual Overlay Tint inside card panel -->
        <div class="absolute inset-0 bg-[#090b14]/25 pointer-events-none"></div>
        
        <!-- Left Side Top Nav -->
        <div class="relative z-10 flex justify-between items-center w-full">
          <span class="text-[13px] font-bold tracking-wide text-white/95">Selected Works</span>
          <div class="flex items-center gap-5">
            <a href="signup.html" class="text-[13.5px] font-bold text-white/95 no-underline hover:text-white transition-colors">Sign Up</a>
            <a href="signup.html" class="px-5 py-2 border border-white/40 hover:border-white text-[13px] font-bold rounded-full text-white/95 hover:text-white transition-all no-underline">Join Us</a>
          </div>
        </div>

        <!-- Left Side Bottom Profile -->
        <div class="relative z-10 flex justify-between items-end w-full mt-auto">
          <div class="flex items-center gap-3">
            <!-- Custom Avatar Illustration -->
            <svg class="w-10 h-10 rounded-full border border-white/20 shadow-md shrink-0" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="50" fill="#e0f2fe"/>
              <circle cx="50" cy="45" r="22" fill="#fed7aa"/>
              <path d="M28 35 C33 22 67 22 72 35 C76 43 68 48 50 48 C32 48 24 43 28 35 Z" fill="#f59e0b"/>
              <circle cx="43" cy="43" r="3.5" fill="#1e293b"/>
              <circle cx="57" cy="43" r="3.5" fill="#1e293b"/>
              <path d="M46 53 Q50 56 54 53" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M20 90 C30 74 70 74 80 90 Z" fill="#3b82f6"/>
            </svg>
            <div class="text-left leading-tight">
              <h4 class="text-[13.5px] font-bold text-white mb-0.5">Andrew.ui</h4>
              <p class="text-[10.5px] text-white/70 font-medium">UI & Illustration</p>
            </div>
          </div>

          <!-- Slide Controls -->
          <div class="flex gap-1.5">
            <button class="w-8 h-8 rounded-full border border-white/25 flex items-center justify-center text-white/80 hover:text-white hover:border-white transition-all cursor-pointer" aria-label="Previous">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
            </button>
            <button class="w-8 h-8 rounded-full border border-white/25 flex items-center justify-center text-white/80 hover:text-white hover:border-white transition-all cursor-pointer" aria-label="Next">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3.5 h-3.5">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Right Side: Forms Panel (Premium Light Green Shade Background) -->
      <div class="lg:col-span-7 p-6 lg:p-12 flex flex-col justify-between min-h-[500px] lg:min-h-0 bg-[#eaf0ed] rounded-[30px]">
        
        <!-- Top Nav Header -->
        <div class="flex justify-between items-center w-full mb-8">
          <span class="font-sans font-extrabold text-[22px] tracking-tight text-charcoal uppercase leading-none">HALFTASK</span>
          
          <!-- Dropdown Language selector -->
          <div class="flex items-center gap-2 px-3.5 py-1.5 border border-sage-green-dark/30 rounded-full text-[12px] font-bold text-charcoal/80 cursor-pointer bg-white hover:bg-slate-50 transition-all">
            <span>🇬🇧 EN</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-3 h-3 text-charcoal/65">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>

        <!-- Center Form Block -->
        <div class="w-full max-w-[360px] mx-auto my-auto text-center flex flex-col items-center">
          
          <!-- Headings -->
          <div class="mb-8 text-center">
            <h2 id="login-heading" class="font-serif text-[38px] lg:text-[44px] font-extrabold text-charcoal tracking-tight leading-tight">Hi Designer</h2>
            <p class="text-[14px] text-sage-green-dark font-semibold mt-1">Welcome to HALFTASK</p>
          </div>

          <!-- Main Input Form -->
          <form id="login-form" class="w-full" novalidate>
            <!-- Email Input (White background field) -->
            <div class="form-group mb-4 relative text-left">
              <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="Email"
                required 
                autocomplete="email"
                spellcheck="false"
                class="w-full h-[52px] px-4.5 text-[15px] text-charcoal border border-sage-green-dark/30 rounded-xl bg-white outline-none transition-all duration-200 focus:border-sage-green-deep focus:ring-4 focus:ring-sage-green/20 placeholder-slate-400 font-medium"
              >
            </div>

            <!-- Password Input (White background field) -->
            <div class="form-group mb-2 relative text-left">
              <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Password"
                required 
                autocomplete="current-password"
                class="w-full h-[52px] px-4.5 text-[15px] text-charcoal border border-sage-green-dark/30 rounded-xl bg-white outline-none transition-all duration-200 focus:border-sage-green-deep focus:ring-4 focus:ring-sage-green/20 placeholder-slate-400 font-medium"
              >
            </div>

            <!-- Forgot Password & Error Container -->
            <div class="flex justify-between items-center w-full mb-6 px-1">
              <div class="text-[12.5px] text-error-color font-semibold opacity-0 transition-opacity duration-200 error-msg" id="email-error" aria-live="polite"></div>
              <a href="#" id="forgot-password" class="text-[12.5px] font-bold text-sage-green-dark hover:text-sage-green-deep hover:underline no-underline ml-auto">Forgot password ?</a>
            </div>

            <!-- Google Login SSO -->
            <button type="button" id="google-btn" class="w-full h-[52px] bg-white hover:bg-slate-50 border border-sage-green-dark/20 rounded-full flex items-center justify-center gap-3 transition-all duration-200 cursor-pointer font-bold text-[14px] text-charcoal shadow-sm mb-4">
              <svg class="w-4.5 h-4.5 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              <span>Login with Google</span>
            </button>

            <!-- Primary Sage Green Deep Button (Matches landing page green accents) -->
            <button type="submit" id="submit-btn" class="inline-flex items-center justify-center w-full h-[52px] rounded-full text-[15px] font-bold border-none cursor-pointer outline-none relative transition-all duration-200 active:scale-[0.985] bg-sage-green-deep text-white hover:bg-[#1a2620] hover:shadow-lg hover:shadow-sage-green-deep/10">
              <span class="btn-text">Login</span>
              <span class="btn-loader w-5 h-5 border-2.5 border-white/20 border-t-white rounded-full animate-[spinner_0.6s_linear_infinite] absolute" hidden></span>
            </button>
          </form>

          <!-- Alternative Registration Link -->
          <div class="mt-6 text-[13.5px] text-charcoal/60 font-semibold">
            <span>Don't have an account?</span>
            <a href="signup.html" id="signup-link" class="text-sage-green-dark hover:text-sage-green-deep hover:underline font-bold no-underline ml-1">Sign up</a>
          </div>

        </div>

        <!-- Social Icons Row -->
        <div class="flex justify-center items-center gap-5 mt-8" aria-label="Alternative sign-in methods">
          <!-- Facebook -->
          <button type="button" id="facebook-btn" class="w-8.5 h-8.5 rounded-full border border-sage-green-dark/20 flex items-center justify-center text-charcoal/50 hover:text-charcoal hover:border-sage-green-dark transition-all cursor-pointer outline-none bg-white" aria-label="Sign in with Facebook">
            <svg class="w-4 h-4 fill-currentColor" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          </button>
          <!-- Twitter/X -->
          <button type="button" id="twitter-btn" class="w-8.5 h-8.5 rounded-full border border-sage-green-dark/20 flex items-center justify-center text-charcoal/50 hover:text-charcoal hover:border-sage-green-dark transition-all cursor-pointer outline-none bg-white" aria-label="Sign in with Twitter">
            <svg class="w-3.5 h-3.5 fill-currentColor" viewBox="0 0 24 24">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </button>
          <!-- LinkedIn -->
          <button type="button" id="linkedin-btn" class="w-8.5 h-8.5 rounded-full border border-sage-green-dark/20 flex items-center justify-center text-charcoal/50 hover:text-charcoal hover:border-sage-green-dark transition-all cursor-pointer outline-none bg-white" aria-label="Sign in with LinkedIn">
            <svg class="w-3.5 h-3.5 fill-currentColor" viewBox="0 0 24 24">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
          </button>
          <!-- Instagram -->
          <button type="button" id="instagram-btn" class="w-8.5 h-8.5 rounded-full border border-sage-green-dark/20 flex items-center justify-center text-charcoal/50 hover:text-charcoal hover:border-sage-green-dark transition-all cursor-pointer outline-none bg-white" aria-label="Sign in with Instagram">
            <svg class="w-3.5 h-3.5 fill-currentColor" viewBox="0 0 24 24">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
          </button>
        </div>

      </div>
      
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
